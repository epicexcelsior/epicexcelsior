<svg xmlns="http://www.w3.org/2000/svg" width="480" height="180" viewBox="0 0 480 180" fill="none">
  <style>
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; fill: #8b949e; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; fill: #8b949e; font-weight: 600; }
    .grid { stroke: #21262d; stroke-width: 1; }
    .line { stroke: #58a6ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .dot { fill: #58a6ff; }
    .area { fill: url(#grad); }
  </style>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50" y="14" class="title">Cumulative Commits</text>

  <!-- Grid lines -->
  <line x1="50" y1="145" x2="460" y2="145" class="grid"/>
  <line x1="50" y1="113.75" x2="460" y2="113.75" class="grid" stroke-dasharray="3,3"/>
  <line x1="50" y1="82.5" x2="460" y2="82.5" class="grid" stroke-dasharray="3,3"/>
  <line x1="50" y1="51.25" x2="460" y2="51.25" class="grid" stroke-dasharray="3,3"/>
  <line x1="50" y1="20" x2="460" y2="20" class="grid" stroke-dasharray="3,3"/>

  <!-- Y-axis labels -->
  <text x="40" y="148" class="label" text-anchor="end">0</text>
  <text x="40" y="117" class="label" text-anchor="end">5</text>
  <text x="40" y="86" class="label" text-anchor="end">10</text>
  <text x="40" y="55" class="label" text-anchor="end">15</text>
  <text x="40" y="24" class="label" text-anchor="end">20</text>

  <!-- X-axis labels -->
  <text x="50" y="160" class="label" text-anchor="middle">Dec</text>
  <text x="177" y="160" class="label" text-anchor="middle">Jan</text>
  <text x="304" y="160" class="label" text-anchor="middle">Feb</text>
  <text x="432" y="160" class="label" text-anchor="middle">Mar</text>

  <!-- Area fill -->
  <path class="area" d="M50,126.25 L164.8,76.25 L201.7,70 L259.1,63.75 L337,57.5 L460,26.25 L460,145 L50,145 Z"/>

  <!-- Line -->
  <polyline class="line" points="50,126.25 164.8,76.25 201.7,70 259.1,63.75 337,57.5 460,26.25"/>

  <!-- Data points -->
  <circle cx="50" cy="126.25" r="3" class="dot"/>
  <circle cx="164.8" cy="76.25" r="3" class="dot"/>
  <circle cx="201.7" cy="70" r="3" class="dot"/>
  <circle cx="259.1" cy="63.75" r="3" class="dot"/>
  <circle cx="337" cy="57.5" r="3" class="dot"/>
  <circle cx="460" cy="26.25" r="3" class="dot"/>
</svg>
